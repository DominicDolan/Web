<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro TV Guide EPG</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            /* Sleek Dark Theme Colors */
            --bg-base: #0f172a;
            --bg-surface: #1e293b;
            --bg-surface-hover: #334155;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --timeline-indicator: #ef4444;

            /* Sizing */
            --sidebar-width: 120px;
            --hour-width: 300px;
            --row-height: 70px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            overflow: hidden; /* Prevent body scroll, handle inside containers */
        }

        /* Top Navigation Bar */
        .navbar {
            height: 60px;
            background-color: var(--bg-surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 24px;
            justify-content: space-between;
        }

        .navbar-brand {
            font-size: 1.25rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--primary);
        }

        .navbar-filters button {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 6px 16px;
            border-radius: 20px;
            margin-left: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .navbar-filters button.active, .navbar-filters button:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* EPG Layout Wrapper */
        .epg-wrapper {
            display: flex;
            height: calc(100vh - 60px);
            position: relative;
        }

        /* Channels Sidebar */
        .epg-sidebar {
            width: var(--sidebar-width);
            background-color: var(--bg-surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .sidebar-header {
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
        }

        .channel-list {
            overflow-y: hidden; /* Sync with main scroll later via JS, but static for now */
        }

        .channel-item {
            height: var(--row-height);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid var(--border);
            padding: 8px;
            text-align: center;
        }

        .channel-logo {
            width: 36px;
            height: 36px;
            background-color: var(--bg-surface-hover);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 4px;
            font-size: 1.1rem;
        }

        .channel-name {
            font-size: 0.75rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }

        /* Main EPG Grid Area */
        .epg-main {
            flex: 1;
            overflow: auto;
            position: relative;
        }

        /* Timeline Header */
        .timeline-header {
            height: 50px;
            background-color: var(--bg-base);
            border-bottom: 1px solid var(--border);
            display: flex;
            position: sticky;
            top: 0;
            z-index: 5;
            width: max-content;
        }

        .time-slot {
            width: calc(var(--hour-width) / 2); /* 30 min slots */
            min-width: calc(var(--hour-width) / 2);
            padding-left: 16px;
            display: flex;
            align-items: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
            border-left: 1px solid var(--border);
        }

        /* Current Time Indicator Line */
        .current-time-line {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 200px; /* Example static position */
            width: 2px;
            background-color: var(--timeline-indicator);
            z-index: 20;
            pointer-events: none;
        }

        .current-time-line::after {
            content: '';
            position: absolute;
            top: 45px;
            left: -4px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: var(--timeline-indicator);
        }

        /* Programs Grid */
        .programs-grid {
            width: max-content;
            position: relative;
        }

        .program-row {
            height: var(--row-height);
            display: flex;
            border-bottom: 1px solid var(--border);
            background-image: linear-gradient(to right, var(--border) 1px, transparent 1px);
            background-size: calc(var(--hour-width) / 2) 100%; /* subtle grid lines */
        }

        .program-card {
            margin: 4px 2px;
            padding: 8px 12px;
            background-color: var(--bg-surface);
            border-radius: 6px;
            border: 1px solid transparent;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: all 0.2s ease;
            overflow: hidden;
        }

        .program-card:hover {
            background-color: var(--bg-surface-hover);
            border-color: var(--primary);
            transform: translateY(-1px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            z-index: 2;
        }

        .program-title {
            font-size: 0.9rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }

        .program-time {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-base);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--bg-surface-hover);
            border-radius: 5px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="navbar-brand">
        <i class="fa-solid fa-tv"></i> GuidePro
    </div>
    <div class="navbar-filters">
        <button class="active">All</button>
        <button>Movies</button>
        <button>Sports</button>
        <button>News</button>
        <button>Kids</button>
    </div>
</nav>

<div class="epg-wrapper">

    <aside class="epg-sidebar">
        <div class="sidebar-header">Channels</div>
        <div class="channel-list" id="channelList">
        </div>
    </aside>

    <main class="epg-main" id="epgMain">
        <div class="current-time-line" style="left: 350px;"></div>

        <div class="timeline-header" id="timelineHeader">
        </div>

        <div class="programs-grid" id="programsGrid">
        </div>
    </main>
</div>

<script>
    // Constants for UI generation
    const HOUR_WIDTH = 300; // pixels per hour
    const START_HOUR = 18;  // Starting at 6:00 PM
    const HOURS_TO_SHOW = 6;

    // Mock Channels
    const channels = [
        { id: 1, name: 'BBC One', icon: 'fa-earth-europe' },
        { id: 2, name: 'Sky Sports', icon: 'fa-futbol' },
        { id: 3, name: 'HBO Max', icon: 'fa-film' },
        { id: 4, name: 'CNN News', icon: 'fa-newspaper' },
        { id: 5, name: 'Discovery', icon: 'fa-leaf' },
        { id: 6, name: 'Nat Geo', icon: 'fa-camera' },
        { id: 7, name: 'Cartoon Net', icon: 'fa-child-reaching' },
        { id: 8, name: 'MTV', icon: 'fa-music' },
        { id: 9, name: 'Comedy Cent', icon: 'fa-masks-theater' },
        { id: 10, name: 'Sci-Fi', icon: 'fa-rocket' }
    ];

    // Helper to format time
    const formatTime = (hour, min) => {
        return `${hour.toString().padStart(2, '0')}:${min === 0 ? '00' : '30'}`;
    };

    // 1. Generate Timeline Headers
    const timelineEl = document.getElementById('timelineHeader');
    for (let i = 0; i < HOURS_TO_SHOW; i++) {
        const currentHour = START_HOUR + i;
        // First half hour
        timelineEl.innerHTML += `<div class="time-slot">${formatTime(currentHour, 0)}</div>`;
        // Second half hour
        timelineEl.innerHTML += `<div class="time-slot">${formatTime(currentHour, 30)}</div>`;
    }

    // 2. Generate Channels and Programs
    const channelListEl = document.getElementById('channelList');
    const programsGridEl = document.getElementById('programsGrid');

    // Sample generic show names
    const showNames = ["Morning News", "The Big Match", "Blockbuster Movie", "Wild Safari", "Tech Today", "Late Night Show", "Sitcom Rerun", "Investigative Report", "Kids Cartoon Hour", "Music Top 40", "Cooking Masterclass", "Sci-Fi Epic"];

    channels.forEach(channel => {
        // Render Channel Sidebar Item
        channelListEl.innerHTML += `
                <div class="channel-item">
                    <div class="channel-logo"><i class="fa-solid ${channel.icon}"></i></div>
                    <div class="channel-name">${channel.name}</div>
                </div>
            `;

        // Render Program Row
        let rowHtml = `<div class="program-row">`;
        let currentMinute = 0;
        const totalMinutes = HOURS_TO_SHOW * 60;

        // Fill the row with random-length programs
        while (currentMinute < totalMinutes) {
            // Random duration: 30, 60, 90, or 120 minutes
            const durations = [30, 60, 90, 120];
            let duration = durations[Math.floor(Math.random() * durations.length)];

            // Cap duration to not exceed the timeline
            if (currentMinute + duration > totalMinutes) {
                duration = totalMinutes - currentMinute;
            }

            // Calculate width in pixels (300px = 60 mins -> 5px per min)
            const widthPx = duration * 5;

            // Calculate Start and End times for text
            const startH = START_HOUR + Math.floor(currentMinute / 60);
            const startM = currentMinute % 60;
            const endH = START_HOUR + Math.floor((currentMinute + duration) / 60);
            const endM = (currentMinute + duration) % 60;

            const timeString = `${formatTime(startH, startM)} - ${formatTime(endH, endM)}`;
            const randomShow = showNames[Math.floor(Math.random() * showNames.length)];

            // Add program card
            rowHtml += `
                    <div class="program-card" style="width: ${widthPx}px; min-width: ${widthPx}px;">
                        <div class="program-title">${randomShow}</div>
                        <div class="program-time">${timeString}</div>
                    </div>
                `;

            currentMinute += duration;
        }
        rowHtml += `</div>`;
        programsGridEl.innerHTML += rowHtml;
    });

    // 3. Sync vertical scrolling between main grid and sidebar
    const epgMain = document.getElementById('epgMain');
    const sidebarList = document.getElementById('channelList');

    epgMain.addEventListener('scroll', () => {
        sidebarList.scrollTop = epgMain.scrollTop;
    });
</script>
</body>
</html>
