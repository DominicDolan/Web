        html, body {
            position: relative;
            width: 100%;
            height: 100%;
        }

        body {
            color: #333;
            margin: 0;
            padding: 8px;
            box-sizing: border-box;

        input, button, select, textarea {

            color: #333;
            background-color: #f4f4f4;
            outline: none;
        }

        button:disabled {
            color: #999;
        }

        button:not(:disabled):active {
            background-color: #ddd;
        }

        button:focus {
            border-color: #666;

    <script type="importmap">{"imports":{"solid-js":"https://jspm.dev/solid-js","solid-js/web":"https://jspm.dev/solid-js/web"}}</script>
    <script src="https://cdn.jsdelivr.net/npm/chobitsu"></script>
    <script type="module">
        let finisher = undefined;
        window.addEventListener('message', ({ data }) => {
            const { event, value } = data;

            if (event !== 'CODE_UPDATE') return;

            const next = () => {
                window.dispose?.();
                window.dispose = undefined;

                document.getElementById('app').innerHTML = "";

                console.clear();

                document.getElementById('appsrc')?.remove();
                const script = document.createElement('script');
                script.id = 'appsrc';
                script.type = 'module';
                finisher = () => {};
                script.onload = () => {
                    if (finisher) finisher();
                    finisher = undefined;
                };
                script.src = value;
                document.body.appendChild(script);

                const load = document.getElementById('load');
                if (load) load.remove();
            }
            if (finisher !== undefined) {
                finisher = next;
            } else {
                next();
            }
        });

        const sendToDevtools = (message) => {
            window.parent.postMessage(JSON.stringify(message), '*');
        };
        let id = 0;
        const sendToChobitsu = (message) => {
            message.id = 'tmp' + ++id;
            chobitsu.sendRawMessage(JSON.stringify(message));
        };
        chobitsu.setOnMessage((message) => {
            if (message.includes('"id":"tmp')) return;
            window.parent.postMessage(message, '*');
        });
        window.addEventListener('message', ({ data }) => {
            try {
                const { event, value } = data;
                if (event === 'DEV') {
                    chobitsu.sendRawMessage(data.data);
                } else if (event === 'LOADED') {
                    sendToDevtools({
                        method: 'Page.frameNavigated',
                        params: {
                            frame: {
                                id: '1',
                                mimeType: 'text/html',
                                securityOrigin: location.origin,
                                url: location.href,
                            },
                            type: 'Navigation',
                        },
                    });
                    sendToChobitsu({ method: 'Network.enable' });
                    sendToDevtools({ method: 'Runtime.executionContextsCleared' });
                    sendToChobitsu({ method: 'Runtime.enable' });
                    sendToChobitsu({ method: 'Debugger.enable' });
                    sendToChobitsu({ method: 'DOMStorage.enable' });
                    sendToChobitsu({ method: 'DOM.enable' });
                    sendToChobitsu({ method: 'CSS.enable' });
                    sendToChobitsu({ method: 'Overlay.enable' });
                    sendToDevtools({ method: 'DOM.documentUpdated' });
                }
            } catch (e) {
                console.error(e);
            }
        });
    </script>
</head>
<body>

<div id="root"><div></div></div>


<script id="appsrc" type="module" src="./src/index.tsx"></script></body><div class="__chobitsu-hide__" style="all: initial;"></div></html>
